<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  margin: 0; background: #f6f7f9; color: #1a1d21;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 14px;
}
.wrap { max-width: 1100px; margin: 0 auto; padding: 20px 18px 60px; }
header.top { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
h1 { font-size: 20px; margin: 0; font-weight: 700; }
.sub { color: #6b7280; font-size: 13px; }

/* ---- ruler (luni) pentru vederea de ansamblu ---- */
.overview { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 14px 16px 16px; }
.ovhead { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ovhead h2 { font-size: 15px; margin: 0; }
.ruler { display: flex; margin-left: var(--labw); border-bottom: 1px solid #e5e7eb; position: relative; }
.ruler .m { flex: 1 1 0; font-size: 10.5px; color: #6b7280; font-weight: 600; text-align: center; padding: 2px 0; border-left: 1px solid #eef0f3; text-transform: uppercase; }

/* ---- rând proiect (acordeon) ---- */
.proj { border-top: 1px solid #eef0f3; }
.proj:first-of-type { border-top: 0; }
.phead { display: flex; align-items: center; gap: 8px; padding: 9px 0; cursor: pointer; }
.arrow { flex: 0 0 22px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; color: #4b5563; transition: transform .15s; font-size: 12px; }
.proj.open .arrow { transform: rotate(180deg); }
.phead:hover .arrow { background: #eef2ff; color: #2563eb; }
.pname { flex: 0 0 calc(var(--labw) - 30px); font-weight: 600; font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pname small { display: block; font-weight: 500; color: #9ca3af; font-size: 11px; }
.ovtrack { position: relative; flex: 1 1 auto; height: 24px; border-left: 1px solid #eef0f3; }
.ovbar { position: absolute; top: 3px; height: 18px; border-radius: 6px; color: #fff; font-size: 10px; font-weight: 600;
  display: flex; align-items: center; padding: 0 7px; white-space: nowrap; overflow: hidden; }
.vline { position: absolute; top: 0; bottom: 0; width: 0; }
.vtoday { border-left: 2px solid #f59e0b; }
.vdl { border-left: 2px dashed #dc2626; }

/* ---- corp desfăşurat: gantt detaliat ---- */
.pbody { display: none; padding: 4px 0 16px; }
.proj.open .pbody { display: block; }
.note { background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; border-radius: 10px; padding: 9px 12px; font-size: 12px; margin: 4px 0 12px; line-height: 1.5; }
.note b { color: #7c2d12; }
.scroll { overflow-x: auto; padding-bottom: 6px; }
.gantt { position: relative; }
.months { display: flex; margin-left: var(--dlab); border-bottom: 1px solid #e5e7eb; }
.month { font-size: 11px; color: #6b7280; font-weight: 600; padding: 2px 6px; border-left: 1px solid #eef0f3; text-transform: uppercase; letter-spacing: .04em; }
.row { display: flex; align-items: center; height: 32px; }
.row:nth-child(even) .track { background: #fafbfc; }
.label { width: var(--dlab); flex: 0 0 var(--dlab); font-size: 12px; padding-right: 10px; color: #374151; display: flex; align-items: center; gap: 6px; }
.dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
.track { position: relative; height: 100%; flex: 1 1 auto; border-left: 1px solid #eef0f3; }
.bar { position: absolute; top: 6px; height: 20px; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; gap: 4px; }
.bar .st { font-size: 10px; }
.bar.in_progress { box-shadow: inset 0 0 0 2px rgba(255,255,255,.6); }
.bar.critical { outline: 2px dashed #b91c1c; outline-offset: 1px; }
.flag { position: absolute; top: -15px; transform: translateX(-50%); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 5px; white-space: nowrap; z-index: 6; }
.flag.today { background: #fef3c7; color: #92400e; border: 1px solid #f59e0b; }
.flag.dl { background: #fee2e2; color: #991b1b; border: 1px solid #dc2626; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11.5px; color: #4b5563; margin-top: 10px; align-items: center; }
.legend span { display: inline-flex; align-items: center; gap: 5px; }
.sw { width: 15px; height: 11px; border-radius: 3px; display: inline-block; }
footer { color: #9ca3af; font-size: 11.5px; text-align: center; margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Project Management</h1>
    <span class="sub" id="updated"></span>
  </header>

  <div class="overview" style="--labw:230px;">
    <div class="ovhead"><h2>Toate proiectele — 2026</h2><span class="sub">apasă pe ▾ ca să desfaci un proiect</span></div>
    <div class="ruler" id="ruler"></div>
    <div id="projects"></div>
  </div>

  <footer>Sursă: proiecte.json (Google Drive) · estimările se confirmă pe parcurs</footer>
</div>

<script>
const DATA = {
  "updatedAt": "2026-06-07",
  "today": "2026-06-08",
  "year": 2026,
  "projects": [
    {
      "id": "casa", "name": "Construcție casă", "color": "#2563eb",
      "deadline": "2026-09-30", "deadlineLabel": "Mutare",
      "stages": [
        { "name": "Glet interior", "start": "2026-06-08", "end": "2026-06-21", "status": "in_progress", "note": "în curs" },
        { "name": "Rigips", "start": "2026-06-22", "end": "2026-06-28", "status": "planned" },
        { "name": "Văr (zugrăvit)", "start": "2026-06-29", "end": "2026-07-12", "status": "planned" },
        { "name": "Parchet", "start": "2026-07-13", "end": "2026-07-19", "status": "planned" },
        { "name": "Mobilier general", "start": "2026-07-20", "end": "2026-08-23", "status": "planned" },
        { "name": "Bucătărie (producție + montaj)", "start": "2026-06-30", "end": "2026-09-30", "status": "planned", "critical": true, "note": "3 luni — comandă acum" }
      ]
    }
  ]
};

const DAY = 86400000;
const PXD = 7, DLAB = 180;
const PALETTE = ["#2563eb","#7c3aed","#0d9488","#ea580c","#db2777","#65a30d","#0891b2","#ca8a04","#9333ea","#16a34a"];
const STATUS = { in_progress:"●", done:"✓", planned:"" };
const d = s => new Date(s + "T00:00:00");
const days = (a,b) => Math.round((d(b)-d(a))/DAY);
const fmt = s => d(s).toLocaleDateString("ro-RO",{day:"numeric",month:"short"});
const MONTHS = ["Ian","Feb","Mar","Apr","Mai","Iun","Iul","Aug","Sep","Oct","Noi","Dec"];

const Y0 = DATA.year + "-01-01", Y1 = (DATA.year+1) + "-01-01";
const YDAYS = days(Y0, Y1);
const pct = s => days(Y0, s) / YDAYS * 100;

document.getElementById("updated").textContent = "actualizat " + fmt(DATA.updatedAt);

// ruler luni
document.getElementById("ruler").innerHTML = MONTHS.map(m=>`<div class="m">${m}</div>`).join("");

// rânduri proiecte
const host = document.getElementById("projects");
DATA.projects.forEach((p, idx) => {
  const ps = p.stages.reduce((m,s)=> d(s.start)<d(m)?s.start:m, p.stages[0].start);
  const ovLeft = pct(ps), ovW = pct(p.deadline) - ovLeft;
  const todayPct = pct(DATA.today), dlPct = pct(p.deadline);

  const el = document.createElement("div");
  el.className = "proj";
  el.innerHTML = `
    <div class="phead">
      <div class="arrow">▾</div>
      <div class="pname">${p.name}<small>deadline ${p.deadlineLabel}: ${fmt(p.deadline)}</small></div>
      <div class="ovtrack">
        <div class="ovbar" style="left:${ovLeft}%;width:${ovW}%;background:${p.color}">${fmt(ps)} → ${fmt(p.deadline)}</div>
        <div class="vline vtoday" style="left:${todayPct}%"></div>
        <div class="vline vdl" style="left:${dlPct}%"></div>
      </div>
    </div>
    <div class="pbody"></div>`;
  el.querySelector(".phead").addEventListener("click", ()=> el.classList.toggle("open"));
  el.querySelector(".pbody").appendChild(detailGantt(p));
  host.appendChild(el);
});

// gantt detaliat per proiect (conţinutul dropdown-ului)
function detailGantt(p){
  let min=p.stages[0].start, max=p.stages[0].end;
  p.stages.forEach(s=>{ if(d(s.start)<d(min))min=s.start; if(d(s.end)>d(max))max=s.end; });
  if(d(p.deadline)>d(max)) max=p.deadline;
  const a=d(min); a.setDate(1);
  const b=d(max); b.setMonth(b.getMonth()+1,1);
  const rs=a.toISOString().slice(0,10), re=b.toISOString().slice(0,10);
  const total=days(rs,re), width=total*PXD;

  // coloane luni
  let cols=[], c=d(rs);
  while(c<d(re)){
    const nx=new Date(c); nx.setMonth(c.getMonth()+1,1);
    const w=Math.round((Math.min(nx,d(re))-c)/DAY)*PXD;
    cols.push({label:c.toLocaleDateString("ro-RO",{month:"short",year:"2-digit"}), w});
    c=nx;
  }
  const todayX=days(rs,DATA.today)*PXD, dlX=days(rs,p.deadline)*PXD;

  const box=document.createElement("div");
  const crit=p.stages.find(s=>s.critical);
  box.innerHTML = `
    ${crit ? `<div class="note">⚠️ <b>Cale critică:</b> „${crit.name}" ~3 luni, se termină fix pe ${fmt(p.deadline)}. Comandă acum — orice întârziere mută data de ${p.deadlineLabel.toLowerCase()}.</div>` : ""}
    <div class="scroll"><div class="gantt" style="--dlab:${DLAB}px; width:${DLAB+width}px;">
      <div class="months">${cols.map(c=>`<div class="month" style="width:${c.w}px">${c.label}</div>`).join("")}</div>
      <div class="rows"></div>
    </div></div>
    <div class="legend">
      <span>Fiecare etapă are culoarea ei.</span>
      <span><i class="sw" style="box-shadow:inset 0 0 0 2px rgba(0,0,0,.25);background:#9aa0a6"></i> ● în curs</span>
      <span><i class="sw" style="outline:2px dashed #b91c1c;outline-offset:-2px;background:#9aa0a6"></i> critic</span>
      <span>✓ gata</span>
      <span><i class="sw" style="border-left:2px solid #f59e0b;width:2px;border-radius:0"></i> azi</span>
      <span><i class="sw" style="border-left:2px dashed #dc2626;width:2px;border-radius:0"></i> deadline</span>
    </div>`;
  const rows=box.querySelector(".rows");
  p.stages.forEach((s,i)=>{
    const col=PALETTE[i % PALETTE.length];
    const x=days(rs,s.start)*PXD, w=Math.max(days(s.start,s.end)*PXD,18);
    const cls=(s.status==="in_progress"?"in_progress ":"")+(s.critical?"critical":"");
    const sym=STATUS[s.status]||"";
    const row=document.createElement("div"); row.className="row";
    row.innerHTML=`
      <div class="label"><span class="dot" style="background:${col}"></span>${s.name}</div>
      <div class="track">
        <div class="bar ${cls}" style="left:${x}px;width:${w}px;background:${col}" title="${fmt(s.start)} – ${fmt(s.end)}${s.note?' · '+s.note:''}">${sym?`<span class="st">${sym}</span>`:""}${fmt(s.start)} – ${fmt(s.end)}</div>
      </div>`;
    rows.appendChild(row);
  });
  const ov=document.createElement("div");
  ov.style.cssText=`position:absolute;left:${DLAB}px;top:22px;bottom:0;width:${width}px;pointer-events:none`;
  ov.innerHTML=`
    <div class="vline vtoday" style="left:${todayX}px"><span class="flag today" style="left:${todayX}px">AZI</span></div>
    <div class="vline vdl" style="left:${dlX}px"><span class="flag dl" style="left:${dlX}px">${p.deadlineLabel} ${fmt(p.deadline)}</span></div>`;
  box.querySelector(".gantt").appendChild(ov);
  return box;
}
</script>
</body>
</html>
